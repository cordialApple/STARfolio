name: CI

on:
  push:
    branches: [main, 'stage/**']
  pull_request:
    branches: [main]

jobs:
  build-and-test:
    runs-on: windows-latest
    defaults:
      run:
        working-directory: app

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: app/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint (gating)
        run: npm run lint

      - name: Typecheck
        run: npm run typecheck

      - name: Unit tests
        run: npm run test:unit

      - name: Build unpackaged (rebuilds native for Electron, then packs)
        run: npm run build:unpack

      - name: E2E smoke test (packaged app)
        run: npx playwright test
